# Application Configuration
# Bharatiya Antariksha Hackathon 2026 - Climate Digital Twin

server:
  host: 0.0.0.0
  port: 8000
  debug: true
  workers: 4

database:
  type: postgresql
  host: localhost
  port: 5432
  database: climate_twin
  user: climate_user
  password: change_me_in_production

cache:
  backend: redis
  host: localhost
  port: 6379
  db: 0
  ttl: 3600

logging:
  level: INFO
  format: json
  file: logs/app.log
  max_size: 100MB
  backup_count: 10

cors:
  allowed_origins:
    - http://localhost:3000
    - http://localhost:8000
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
  allowed_headers:
    - Content-Type
    - Authorization

api:
  rate_limit: 1000
  rate_limit_period: 3600 # seconds
  timeout: 30

data:
  cache_dir: ./data/cache
  temp_dir: ./data/temp
  output_dir: ./data/output
  archive_dir: ./data/archive
