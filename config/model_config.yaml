# Machine Learning Model Configuration
# Bharatiya Antariksha Hackathon 2026

models:
  # LSTM Forecaster Configuration
  lstm:
    type: lstm
    enabled: true
    input_size: 100
    hidden_size: 256
    num_layers: 3
    output_size: 1
    dropout: 0.2
    batch_size: 32
    learning_rate: 0.001
    epochs: 100
    early_stopping_patience: 10

  # CNN Spatial Pattern Model
  cnn:
    type: cnn
    enabled: true
    in_channels: 1
    num_filters: 32
    kernel_size: 3
    batch_size: 16
    learning_rate: 0.001
    epochs: 100

  # Transformer Model
  transformer:
    type: transformer
    enabled: true
    input_size: 100
    d_model: 256
    nhead: 8
    num_layers: 3
    dim_feedforward: 1024
    dropout: 0.1
    batch_size: 32
    learning_rate: 0.0001
    epochs: 100

  # Hybrid CNN-LSTM Model
  hybrid:
    type: hybrid
    enabled: true
    spatial_channels: 1
    temporal_features: 50
    hidden_size: 128
    num_filters: 32

  # Graph Neural Network
  gnn:
    type: gnn
    enabled: true
    input_dim: 50
    hidden_dim: 64
    output_dim: 1
    num_layers: 3

# Data Assimilation Configuration
data_assimilation:
  # Ensemble Kalman Filter
  enkf:
    enabled: true
    ensemble_size: 100
    state_dimension: 10000
    inflation_factor: 1.1
    localization_radius: 500 # km

  # 3D-Var
  var3d:
    enabled: true
    state_dimension: 10000
    max_iterations: 50
    convergence_tolerance: 1e-5

  # Hybrid Approach
  hybrid:
    enabled: true
    ensemble_size: 50
    alpha: 0.5 # Weighting between ensemble and variational

# Observation Configuration
observations:
  satellite:
    insat:
      enabled: true
      update_frequency: hourly
      products:
        - cloud_cover
        - sea_surface_temperature
        - outgoing_longwave_radiation
      error_std: 2.0

    oceansat:
      enabled: true
      update_frequency: daily
      products:
        - surface_wind_speed
        - sea_surface_height
      error_std: 1.5

  ground_network:
    imd:
      enabled: true
      update_frequency: daily
      num_stations: 2400
      variables:
        - temperature
        - humidity
        - wind_speed
        - rainfall
        - sea_level_pressure
      error_std: 0.5

# Forecast Configuration
forecasting:
  forecast_horizon: 15 # days
  ensemble_members: 50
  update_frequency: daily
  output_variables:
    - temperature
    - precipitation
    - wind_speed
    - humidity
    - pressure

# Regional Configuration
regions:
  india_all:
    latitude_range: [8, 35]
    longitude_range: [68, 97]
    resolution: 1.0 # degrees

  monsoon_zone:
    latitude_range: [10, 30]
    longitude_range: [70, 95]
    resolution: 0.5

  coastal:
    latitude_range: [8, 35]
    longitude_range: [65, 97]
    resolution: 0.25

# Performance Settings
performance:
  num_threads: 8
  gpu_enabled: true
  batch_processing: true
  parallel_regions: true
